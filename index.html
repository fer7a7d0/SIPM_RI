<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Inventario �</title>
    <style>
        /* General Styles */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background: #ffffff;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
        }

        .form-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 20px;
        }

        .form-title span {
            font-size: 1.5rem;
        }

        form {
            display: flex;
            flex-direction: column;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            font-size: 0.9rem;
            color: #555;
            margin-bottom: 5px;
            display: block;
        }

        input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: #87ceeb;
            box-shadow: 0 0 5px rgba(135, 206, 235, 0.5);
            outline: none;
        }

        button {
            background-color: #87ceeb;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #4682b4;
        }

        button:active {
            transform: scale(0.98);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-container {
            animation: fadeIn 0.5s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-title">
            <span>Registro de Inventario</span>
            <span>�</span>
        </div>
        <form id="inventory-form">
            <div class="form-group">
                <label for="nombre">Nombre</label>
                <select id="nombre" name="nombre" required>
                    <option value="">Seleccionar nombre</option>
                    <option value="Fernando Moreno">Fernando Moreno</option>
                    <option value="Humberto Huerta">Humberto Huerta</option>
                    <option value="Christian Molina">Christian Molina</option>
                    <option value="Jose Zapata">Jose Zapata</option>
                    <option value="Orlando Ibarra">Orlando Ibarra</option>
                </select>
            </div>
            <div class="form-group">
                <label for="area">Área</label>
                <select id="area" name="area" required>
                    <option value="">Seleccionar área</option>
                    <option value="Rampa 1 (GIM)">Rampa 1 (GIM)</option>
                    <option value="Rampa 2 (GE)">Rampa 2 (GE)</option>
                    <option value="Rampa 3 (GB)">Rampa 3 (GB)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="codigo">Código</label>
                <select id="codigo" name="codigo" required>
                    <option value="">Seleccionar código</option>
                    <option value="122">122</option>
                    <option value="130">130</option>
                </select>
                <div class="error-message" id="codigo-error">Código no válido</div>
            </div>
            <div class="form-group">
                <label for="producto">Producto</label>
                <input type="text" id="producto" name="producto" readonly>
            </div>
            <div class="form-group">
                <label for="tt">TT</label>
                <input type="text" id="tt" name="tt" readonly>
            </div>
            <div class="form-group">
                <label for="cilindros">Cilindros</label>
                <input type="number" id="cilindros" name="cilindros" required>
            </div>
            <button type="submit">Enviar</button>
        </form>

        <script>
            const codigoData = {
                "122": { producto: "Dewar de argón", tt: "Argón" },
                "130": { producto: "Dewar de Oxígeno", tt: "Oxígeno" }
            };

            const codigoSelect = document.getElementById('codigo');
            const productoInput = document.getElementById('producto');
            const ttInput = document.getElementById('tt');
            const codigoError = document.getElementById('codigo-error');

            codigoSelect.addEventListener('change', () => {
                const selectedCodigo = codigoSelect.value;

                if (codigoData[selectedCodigo]) {
                    productoInput.value = codigoData[selectedCodigo].producto;
                    ttInput.value = codigoData[selectedCodigo].tt;

                    productoInput.classList.add('highlight');
                    ttInput.classList.add('highlight');

                    setTimeout(() => {
                        productoInput.classList.remove('highlight');
                        ttInput.classList.remove('highlight');
                    }, 1000);

                    codigoError.style.display = 'none';
                } else {
                    productoInput.value = '';
                    ttInput.value = '';
                    codigoError.style.display = 'block';
                }
            });
        </script>
    </div>
</body>
</html>

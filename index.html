<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda de Objetivos 2025</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ccc;
            text-align: left;
        }

        th {
            background-color: #4CAF50;
            color: white;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        textarea {
            width: 100%;
            height: 50px;
            resize: vertical;
        }

        .completed {
            background-color: #d4edda;
        }

        .pending {
            background-color: #fff3cd;
        }
    </style>
</head>
<body>
    <h1>Agenda de Objetivos 2025</h1>

    <table>
        <thead>
            <tr>
                <th>Objetivo</th>
                <th>Fecha límite</th>
                <th>Estado</th>
                <th>Notas</th>
            </tr>
        </thead>
        <tbody>
            <tr class="pending">
                <td>Ejemplo: Mejorar mis finanzas</td>
                <td>31/12/2025</td>
                <td>Pendiente</td>
                <td><textarea placeholder="Agregar notas aquí..."></textarea></td>
            </tr>
            <tr class="completed">
                <td>Ejemplo: Leer 12 libros</td>
                <td>31/12/2025</td>
                <td>Completado</td>
                <td><textarea placeholder="Agregar notas aquí...">Leí todos los libros planeados</textarea></td>
            </tr>
        </tbody>
    </table>
</body>
</html>

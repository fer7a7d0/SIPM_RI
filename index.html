<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Inventario</title>
    <style>
        /* General Styles */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f7f9fc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
        }

        .form-container h1 {
            font-size: 1.5rem;
            color: #333;
            text-align: center;
            margin-bottom: 20px;
            position: relative;
        }

        .form-container h1::after {
            content: '📦';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }

        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        .form-group input:focus, .form-group select:focus {
            border-color: #7daaf2;
            box-shadow: 0 0 5px rgba(125, 170, 242, 0.5);
            outline: none;
        }

        .form-group input[type="number"] {
            -moz-appearance: textfield;
        }

        .form-group input[type="number"]::-webkit-inner-spin-button, 
        .form-group input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .form-group input:focus {
            animation: focusAnimation 0.3s ease-in-out;
        }

        @keyframes focusAnimation {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        .submit-btn {
            width: 100%;
            padding: 10px;
            background-color: #7daaf2;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .submit-btn:hover {
            background-color: #6b9ae0;
            transform: translateY(-2px);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

    </style>
</head>
<body>
    <div class="form-container">
        <h1>Registro de Inventario</h1>
        <form id="inventory-form">
            <div class="form-group">
                <label for="name">Nombre</label>
                <input type="text" id="name" name="name" required>
            </div>
            <div class="form-group">
                <label for="area">Área</label>
                <input type="text" id="area" name="area" required>
            </div>
            <div class="form-group">
                <label for="code">Código</label>
                <input type="number" id="code" name="code" required>
            </div>
            <div class="form-group">
                <label for="product">Producto</label>
                <input type="text" id="product" name="product" required>
            </div>
            <div class="form-group">
                <label for="tt">TT</label>
                <input type="text" id="tt" name="tt" required>
            </div>
            <div class="form-group">
                <label for="cylinders">Cilindros</label>
                <input type="number" id="cylinders" name="cylinders" required>
            </div>
            <button type="submit" class="submit-btn">Enviar</button>
        </form>
    </div>
    <script>
        document.getElementById('inventory-form').addEventListener('submit', function(event) {
            event.preventDefault();
            const inputs = document.querySelectorAll('#inventory-form input');
            let valid = true;

            inputs.forEach(input => {
                if (!input.value.trim()) {
                    valid = false;
                    input.style.borderColor = 'red';
                } else {
                    input.style.borderColor = '';
                }
            });

            if (valid) {
                alert('Formulario enviado con éxito');
                this.reset();
            } else {
                alert('Por favor, complete todos los campos.');
            }
        });
    </script>
</body>
</html>

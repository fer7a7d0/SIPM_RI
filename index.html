<!DOCTYPE html>
<html lang="en">

<head>
    <!-- ============================================================
         🔹 1. METADATOS Y RECURSOS
    ============================================================ -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Inventario</title>

    <!-- Estilos -->
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>

    <!-- ============================================================
         🔹 2. CONTENEDOR PRINCIPAL
         (Formulario + Tabla + Botón)
    ============================================================ -->
    <div class="form-container">

        <!-- 🔹 2.1 TÍTULO -->
        <h1 class="form-title" style="display: flex; align-items: center; justify-content: center; gap: 12px;">
            <img src="img/logo-sipm.png" alt="SIPM Logo" style="max-width: 120px;">
            Registro de Inventario
        </h1>

        <!-- ========================================================
             🔹 2.2 FORMULARIO DE REGISTRO
        ======================================================== -->
        <form id="inventory-form">



            <!-- Nombre -->
            <label for="name">Nombre</label>
            <select id="name" required>
                <option value="">Seleccionar nombre</option>
                <option value="Christian Molina">Christian Molina</option>
                <option value="Fernando Moreno">Fernando Moreno</option>
                <option value="Humberto Huerta">Humberto Huerta</option>
                <option value="Jose Zapata">Jose Zapata</option>
                <option value="Orlando Ibarra">Orlando Ibarra</option>
            </select>

            <!-- Área -->
            <label for="area">Área</label>
            <select id="area" required>
                <option value="">Seleccionar área</option>
                <option value="1 - GIM">1 - GIM</option>
                <option value="2 - Pared">2 - Pared</option>
                <option value="3 - Acetileno">3 - Acetileno</option>
                <option value="4 - Hidrógeno">4 - Hidrógeno</option>
                <option value="5 - GEM">5 - GEM</option>
                <option value="6 - GB">6 - GB</option>
                <option value="7 - CO2">7 - CO2</option>
                <option value="8 - Dewars">8 - Dewars</option>

            </select>

            <!-- Código -->
            <label for="code">Código</label>
            <input type="tel"
                   id="code"
                   list="code-suggestions"
                   pattern="[0-9]*"
                   inputmode="numeric"
                   enterkeyhint="enter"
                   required>

            <datalist id="code-suggestions"></datalist>

            <!-- Tanque termo (readonly) -->
            <input type="text"
                   id="tt"
                   readonly
                   placeholder="TT - materia prima">

            <!-- Producto (readonly) -->
            <input type="text"
                   id="product"
                   readonly
                   placeholder="Descripción de producto">

            <!-- Cilindros -->
            <label for="cylinders">Cilindros</label>
            <input type="tel"
                   id="cylinders"
                   pattern="[0-9]*"
                   inputmode="numeric"
                   enterkeyhint="enter"
                   required>

            <!-- Botón Enviar -->
            <button type="submit">Enviar</button>

        </form>

        <!-- ========================================================
             🔹 2.3 CONTENEDOR DE TABLA DINÁMICA
             (Generada por JS)
        ======================================================== -->
        <div id="table-container"></div>

        <!-- ========================================================
             🔹 2.4 BOTÓN DE DESCARGA CSV
             (Controlado por JS)
        ======================================================== -->
        <button id="download-btn" style="display:none;">
            Descargar CSV
        </button>

    </div>

    <!-- ============================================================
         🔹 3. SCRIPT PRINCIPAL
    ============================================================ -->
    <script src="js/app.js"></script>

    <!-- =========================
     BOTÓN SCROLL DINÁMICO
========================= -->
    <button id="scrollToggleBtn" class="scroll-toggle" aria-label="Navegar">
        ↓
    </button>
    
    
    <!-- =========================
         SCRIPT SCROLL INFERIOR
    ========================= -->
    
    <script>
    const scrollBtn = document.getElementById("scrollToggleBtn");
    
    window.addEventListener("scroll", () => {
    
        const scrollPosition = window.innerHeight + window.scrollY;
        const bottomPosition = document.documentElement.scrollHeight - 10;
    
        // Si estás en el fondo
        if (scrollPosition >= bottomPosition) {
            scrollBtn.style.display = "block";
            scrollBtn.textContent = "↑";
        } 
        // Si no estás en el fondo
        else {
            scrollBtn.style.display = "block";
            scrollBtn.textContent = "↓";
        }
    
        // Si el contenido no necesita scroll
        if (document.documentElement.scrollHeight <= window.innerHeight) {
            scrollBtn.style.display = "none";
        }
    });
    
    scrollBtn.addEventListener("click", () => {
    
        const isAtBottom = (window.innerHeight + window.scrollY) >= 
                           document.documentElement.scrollHeight - 10;
    
        if (isAtBottom) {
            window.scrollTo({ top: 0, behavior: "smooth" });
        } else {
            window.scrollTo({
                top: document.documentElement.scrollHeight,
                behavior: "smooth"
            });
        }
    });
    </script>

</body>

</html>

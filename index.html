<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Inventario</title>
    <style>
        /* General Styles */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f0f8ff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container {
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
        }

        .form-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.5rem;
            color: #333;
            margin-bottom: 20px;
        }

        .form-title span {
            font-size: 1.5rem;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
        }

        select, input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            border-color: #87ceeb;
            box-shadow: 0 0 5px rgba(135, 206, 235, 0.5);
            outline: none;
        }

        input[readonly] {
            background-color: #f9f9f9;
            cursor: not-allowed;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #87ceeb;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #4682b4;
        }

        button:focus {
            outline: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-title">
            <span>Registro de Inventario</span>
            <span>📝</span>
        </div>
        <form id="inventory-form">
            <div class="form-group">
                <label for="name">Nombre</label>
                <select id="name" required>
                    <option value="">Seleccionar nombre</option>
                    <option value="Fernando Moreno">Fernando Moreno</option>
                    <option value="Humberto Huerta">Humberto Huerta</option>
                    <option value="Christian Molina">Christian Molina</option>
                    <option value="Jose Zapata">Jose Zapata</option>
                    <option value="Orlando Ibarra">Orlando Ibarra</option>
                </select>
            </div>

            <div class="form-group">
                <label for="area">Área</label>
                <select id="area" required>
                    <option value="">Seleccionar área</option>
                    <option value="Rampa 1 (GIM)">Rampa 1 (GIM)</option>
                    <option value="Rampa 2 (GE)">Rampa 2 (GE)</option>
                    <option value="Rampa 3 (GB)">Rampa 3 (GB)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="code">Código</label>
                <input list="codes" id="code" type="number" required>
                <datalist id="codes">
                    <option value="122">122</option>
                    <option value="130">130</option>
                </datalist>
            </div>

            <div class="form-group">
                <label for="product">Producto</label>
                <input id="product" type="text" readonly>
            </div>

            <div class="form-group">
                <label for="tt">TT</label>
                <input id="tt" type="text" readonly>
            </div>

            <div class="form-group">
                <label for="cylinders">Cilindros</label>
                <input id="cylinders" type="number" required>
            </div>

            <button type="submit">Enviar</button>
        </form>
    </div>

    <script>
        const codeToProduct = {
            122: { product: "Dewar de argón", tt: "Argón" },
            130: { product: "Dewar de Oxígeno", tt: "Oxígeno" }
        };

        const codeInput = document.getElementById('code');
        const productInput = document.getElementById('product');
        const ttInput = document.getElementById('tt');

        codeInput.addEventListener('input', () => {
            const code = codeInput.value;
            if (codeToProduct[code]) {
                productInput.value = codeToProduct[code].product;
                ttInput.value = codeToProduct[code].tt;
                productInput.classList.add('fade-in');
                ttInput.classList.add('fade-in');
                setTimeout(() => {
                    productInput.classList.remove('fade-in');
                    ttInput.classList.remove('fade-in');
                }, 500);
            } else {
                productInput.value = '';
                ttInput.value = '';
            }
        });

        document.getElementById('inventory-form').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Formulario enviado con éxito');
        });
    </script>
</body>
</html>
